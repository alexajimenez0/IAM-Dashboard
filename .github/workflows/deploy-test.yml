name: Deploy IAM Dashboard Strict

on:
  push:
    branches:
      - feature/devops/enforce-security-scans

jobs:
  dependency-audit-test:
    name: Dependency Vulnerability Audit - TEST
    uses: ./.github/workflows/dependency-audit-test.yml
    secrets: inherit

  devsecops-scan-test:
    name: DevSecOps Security Scan - TEST
    uses: ./.github/workflows/devsecops-scan-test.yml
    secrets: inherit

  deploy:
    needs:
      - dependency-audit-test
      - devsecops-scan-test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Set deployment variables
      id: deployment-vars
      run: |
        # Use hardcoded resource names - infrastructure is managed separately
        echo "lambda_function=iam-dashboard-scanner" >> $GITHUB_OUTPUT
        echo "s3_bucket=iam-dashboard-project" >> $GITHUB_OUTPUT
        echo "cloudfront_id=" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Build and Deploy Frontend (test mode)
      run: |
        npm ci
        npm run build
        S3_BUCKET="${{ steps.deployment-vars.outputs.s3_bucket }}"
        if [ -z "$S3_BUCKET" ]; then
          echo "No S3 bucket found in Terraform outputs, using default pattern"
          S3_BUCKET="iam-dashboard-frontend-$(date +%s)"
        fi
        echo "This is a test. Skipping: aws s3 sync build/ s3://$S3_BUCKET/ --delete"
        CLOUDFRONT_ID="${{ steps.deployment-vars.outputs.cloudfront_id }}"
        if [ -n "$CLOUDFRONT_ID" ]; then
          echo "This is a test. Skipping CloudFront invalidation for distribution $CLOUDFRONT_ID"
        else
          echo "No CloudFront distribution found, skipping cache invalidation"
        fi

    - name: Build Lambda package (Docker)
      run: |
        echo "Building Lambda deployment package in Docker..."
        docker buildx create --use --name lambda-builder 2>/dev/null || true
        docker buildx build -f infra/lambda/Dockerfile.build --output type=local,dest=./lambda-out infra/lambda
        docker buildx rm lambda-builder 2>/dev/null || true
        echo "Lambda package: lambda-out/lambda_function.zip"

    - name: Deploy Lambda Function (test mode)
      run: |
        LAMBDA_FUNCTION_NAME="${{ steps.deployment-vars.outputs.lambda_function }}"
        if [ -z "$LAMBDA_FUNCTION_NAME" ]; then
          echo "No Lambda function name found, using default: iam-dashboard-scanner"
          LAMBDA_FUNCTION_NAME="iam-dashboard-scanner"
        fi
        echo "This is a test. Skipping: aws lambda update-function-code --function-name $LAMBDA_FUNCTION_NAME --zip-file fileb://lambda-out/lambda_function.zip"
