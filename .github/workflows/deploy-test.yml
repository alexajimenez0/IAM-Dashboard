name: Deploy IAM Dashboard Strict

on:
  push:
    branches:
      - feature/devops/enforce-security-scans

jobs:
  dependency-audit-test:
    name: Dependency Vulnerability Audit - TEST
    uses: ./.github/workflows/dependency-audit-test.yml
    secrets: inherit

  devsecops-scan-test:
    name: DevSecOps Security Scan - TEST
    uses: ./.github/workflows/devsecops-scan-test.yml
    secrets: inherit

  deploy:
    needs:
      - dependency-audit-test
      - devsecops-scan-test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test mode (skip AWS credentials)
      run: |
        echo "Test mode active: skipping AWS credential configuration."

    - name: Set deployment variables
      id: deployment-vars
      run: |
        # Use hardcoded resource names - infrastructure is managed separately
        echo "lambda_function=iam-dashboard-scanner" >> $GITHUB_OUTPUT
        echo "s3_bucket=iam-dashboard-project" >> $GITHUB_OUTPUT
        echo "cloudfront_id=" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Frontend deploy test (no S3 upload)
      run: |
        echo "Frontend deploy test is successful. No S3 upload performed."

    - name: Lambda package test (no build)
      run: |
        echo "Lambda package test is successful. No Docker build performed."

    - name: Lambda deploy test (no Lambda update)
      run: |
        echo "Lambda deploy test is successful. No Lambda function update performed."
