name: Deploy IAM Dashboard

on:
  workflow_run:
    workflows:
      - Dependency Vulnerability Audit
      - DevSecOps Security Scan
    types:
      - completed

jobs:
  gate:
    name: Gate on security workflows
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      ready: ${{ steps.evaluate.outputs.ready }}
    steps:
      - name: Evaluate security workflow results for this commit
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const required = ["Dependency Vulnerability Audit", "DevSecOps Security Scan"];
            const wr = context.payload.workflow_run;
            const isMainPush = wr.event === "push" && wr.head_branch === "main";

            if (!isMainPush) {
              core.info("Not a push to main. Deployment remains blocked.");
              core.setOutput("ready", "false");
              return;
            }

            const { owner, repo } = context.repo;
            const headSha = wr.head_sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: headSha,
              event: "push",
              per_page: 100
            });

            const latestByName = new Map();
            for (const run of runs) {
              if (!required.includes(run.name)) continue;
              const prev = latestByName.get(run.name);
              if (!prev || new Date(run.created_at) > new Date(prev.created_at)) {
                latestByName.set(run.name, run);
              }
            }

            const missing = required.filter((name) => !latestByName.has(name));
            if (missing.length > 0) {
              core.info(`Waiting for workflows to complete: ${missing.join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            const failed = required.filter((name) => latestByName.get(name).conclusion !== "success");
            if (failed.length > 0) {
              core.warning(`Deployment blocked. Failed security workflows: ${failed.join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            core.info(`All required security workflows passed for ${headSha}.`);
            core.setOutput("ready", "true");

  deploy:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        # AWS_ROLE_ARN secret must be configured in Repository Settings -> Secrets
        # Format: arn:aws:iam::ACCOUNT_ID:role/IAMDash-Deployer-Prod
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Set deployment variables
      id: deployment-vars
      run: |
        # Use hardcoded resource names - infrastructure is managed separately
        echo "lambda_function=iam-dashboard-scanner" >> $GITHUB_OUTPUT
        echo "s3_bucket=iam-dashboard-project" >> $GITHUB_OUTPUT
        echo "cloudfront_id=" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Build and Deploy Frontend
      run: |
        npm ci
        npm run build
        S3_BUCKET="${{ steps.deployment-vars.outputs.s3_bucket }}"
        if [ -z "$S3_BUCKET" ]; then
          echo "No S3 bucket found in Terraform outputs, using default pattern"
          S3_BUCKET="iam-dashboard-frontend-$(date +%s)"
        fi
        echo "Uploading build files to s3://$S3_BUCKET/"
        aws s3 sync build/ s3://$S3_BUCKET/ --delete
        CLOUDFRONT_ID="${{ steps.deployment-vars.outputs.cloudfront_id }}"
        if [ -n "$CLOUDFRONT_ID" ]; then
          echo "Invalidating CloudFront cache for distribution $CLOUDFRONT_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*"
        else
          echo "No CloudFront distribution found, skipping cache invalidation"
        fi

    - name: Build Lambda package (Docker)
      run: |
        echo "Building Lambda deployment package in Docker..."
        docker buildx create --use --name lambda-builder 2>/dev/null || true
        docker buildx build -f infra/lambda/Dockerfile.build --output type=local,dest=./lambda-out infra/lambda
        docker buildx rm lambda-builder 2>/dev/null || true
        echo "Lambda package: lambda-out/lambda_function.zip"

    - name: Deploy Lambda Function
      run: |
        LAMBDA_FUNCTION_NAME="${{ steps.deployment-vars.outputs.lambda_function }}"
        if [ -z "$LAMBDA_FUNCTION_NAME" ]; then
          echo "No Lambda function name found, using default: iam-dashboard-scanner"
          LAMBDA_FUNCTION_NAME="iam-dashboard-scanner"
        fi
        echo "Updating Lambda function $LAMBDA_FUNCTION_NAME"
        aws lambda update-function-code \
          --function-name "$LAMBDA_FUNCTION_NAME" \
          --zip-file fileb://lambda-out/lambda_function.zip
        echo "Lambda function deployed successfully"
