name: Deploy IAM Dashboard

on:
  workflow_run:
    workflows:
      - Dependency Vulnerability Audit
      - DevSecOps Security Scan
    types:
      - completed

jobs:
  gate:
    name: Gate on security workflows
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      ready: ${{ steps.evaluate.outputs.ready }}
    steps:
      - name: Evaluate security workflow results for this commit
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const required = ["Dependency Vulnerability Audit", "DevSecOps Security Scan"];
            const wr = context.payload.workflow_run;
            const isMainPush = wr.event === "push" && wr.head_branch === "feature/devops/enforce-security-scans";

            if (!isMainPush) {
              core.info("Not a push to main. Deployment remains blocked.");
              core.setOutput("ready", "false");
              return;
            }

            const { owner, repo } = context.repo;
            const headSha = wr.head_sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: headSha,
              event: "push",
              per_page: 100
            });

            const latestByName = new Map();
            for (const run of runs) {
              if (!required.includes(run.name)) continue;
              const prev = latestByName.get(run.name);
              if (!prev || new Date(run.created_at) > new Date(prev.created_at)) {
                latestByName.set(run.name, run);
              }
            }

            const missing = required.filter((name) => !latestByName.has(name));
            if (missing.length > 0) {
              core.info(`Waiting for workflows to complete: ${missing.join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            const failed = required.filter((name) => latestByName.get(name).conclusion !== "success");
            if (failed.length > 0) {
              core.warning(`Deployment blocked. Failed security workflows: ${failed.join(", ")}`);
              core.setOutput("ready", "false");
              return;
            }

            core.info(`All required security workflows passed for ${headSha}.`);
            core.setOutput("ready", "true");

  deploy:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Test mode (skip AWS credentials)
      run: echo "Test mode active: skipping AWS credential configuration."

    - name: Set deployment variables
      id: deployment-vars
      run: |
        # Use hardcoded resource names - infrastructure is managed separately
        echo "lambda_function=iam-dashboard-scanner" >> $GITHUB_OUTPUT
        echo "s3_bucket=iam-dashboard-project" >> $GITHUB_OUTPUT
        echo "cloudfront_id=" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Frontend deploy test (no S3 upload)
      run: |
        echo "Frontend deploy test is successful. No S3 upload performed."

    - name: Lambda package test (no build)
      run: |
        echo "Lambda package test is successful. No Docker build performed."

    - name: Lambda deploy test (no Lambda update)
      run: |
        echo "Lambda deploy test is successful. No Lambda function update performed."
