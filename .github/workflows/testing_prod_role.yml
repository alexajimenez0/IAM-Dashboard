name: Assuming Prod Role

on:
  push:
    branches: [ feature/devops/fix-terraform-apply ]
    paths:
      - "infra/**"
      - ".github/workflows/testing_prod_role.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: assuming-prod-role-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan (Prod Role Assume Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC - Prod Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1

      - name: Print assumed identity ARN
        run: aws sts get-caller-identity --query Arn --output text

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color
