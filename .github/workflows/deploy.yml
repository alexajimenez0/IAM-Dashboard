name: Deploy IAM Dashboard 

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dependency-audit:
    name: Dependency Vulnerability Audit
    uses: ./.github/workflows/dependency-audit.yml
    secrets: inherit

  devsecops-scan:
    name: DevSecOps Security Scan
    uses: ./.github/workflows/devsecops-scan.yml
    secrets: inherit

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs:
      - dependency-audit
      - devsecops-scan
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-1

    - name: Set deployment variables
      id: deployment-vars
      run: |
        # Use hardcoded resource names - infrastructure is managed separately
        echo "lambda_function=iam-dashboard-scanner" >> $GITHUB_OUTPUT
        echo "s3_bucket=iam-dashboard-project" >> $GITHUB_OUTPUT
        echo "cloudfront_id=" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Build and Deploy Frontend
      run: |
        npm ci
        npm run build
        S3_BUCKET="${{ steps.deployment-vars.outputs.s3_bucket }}"
        if [ -z "$S3_BUCKET" ]; then
          echo "No S3 bucket found in Terraform outputs, using default pattern"
          S3_BUCKET="iam-dashboard-frontend-$(date +%s)"
        fi
        echo "Uploading build files to s3://$S3_BUCKET/"
        aws s3 sync build/ s3://$S3_BUCKET/ --delete
        CLOUDFRONT_ID="${{ steps.deployment-vars.outputs.cloudfront_id }}"
        if [ -n "$CLOUDFRONT_ID" ]; then
          echo "Invalidating CloudFront cache for distribution $CLOUDFRONT_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_ID" \
            --paths "/*"
        else
          echo "No CloudFront distribution found, skipping cache invalidation"
        fi

    - name: Build Lambda package (Docker)
      run: |
        echo "Building Lambda deployment package in Docker..."
        docker buildx create --use --name lambda-builder 2>/dev/null || true
        docker buildx build -f infra/lambda/Dockerfile.build --output type=local,dest=./lambda-out infra/lambda
        docker buildx rm lambda-builder 2>/dev/null || true
        echo "Lambda package: lambda-out/lambda_function.zip"

    - name: Deploy Lambda Function
      run: |
        LAMBDA_FUNCTION_NAME="${{ steps.deployment-vars.outputs.lambda_function }}"
        if [ -z "$LAMBDA_FUNCTION_NAME" ]; then
          echo "No Lambda function name found, using default: iam-dashboard-scanner"
          LAMBDA_FUNCTION_NAME="iam-dashboard-scanner"
        fi
        echo "Updating Lambda function $LAMBDA_FUNCTION_NAME"
        aws lambda update-function-code \
          --function-name "$LAMBDA_FUNCTION_NAME" \
          --zip-file fileb://lambda-out/lambda_function.zip
        echo "Lambda function deployed successfully"
